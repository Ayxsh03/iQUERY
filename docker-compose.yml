version: '3.9'

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iquery-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # We let env_file handle the LLM configuration so the host env doesn't override it with blanks
      - APP_ENV=production
      - DB_PATH=/app/iquery.db
      - FRONTEND_URL=http://localhost:3000
    volumes:
      # Persist ChromaDB and SQLite between restarts (local dev only)
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: iquery-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: iquery-network
